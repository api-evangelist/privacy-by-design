name: Privacy By Design
description: A framework and approach that embeds privacy protections into the design
  and operation of IT systems, networked infrastructure, and business practices from
  the ground up, rather than as an afterthought. It is widely adopted across industries
  to safeguard digital assets and reduce security risks.
